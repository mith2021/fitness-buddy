<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628;
      color: #e2e8f0;
      padding: 16px;
    }
    h1 { font-size: 14px; font-weight: 700; color: #7fd6ef; margin-bottom: 12px; }
    label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #1e3a5f;
      background: #0e1f3a;
      color: #e2e8f0;
      font-size: 12px;
      margin-bottom: 10px;
    }
    input:focus { outline: none; border-color: #7fd6ef; }
    button {
      width: 100%;
      padding: 9px;
      border-radius: 6px;
      border: none;
      background: #0ea5e9;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0284c7; }
    #status {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      min-height: 16px;
    }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .hint {
      margin-top: 12px;
      font-size: 10px;
      color: #64748b;
      line-height: 1.5;
    }
    .hint a { color: #7fd6ef; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Verdict MFP Sync</h1>
  <label for="token">Pairing token</label>
  <input id="token" type="password" placeholder="Paste token from Verdict settings" />
  <button id="save">Save &amp; Connect</button>
  <div id="status"></div>
  <p class="hint">
    Get your token in <a href="https://fitness-buddy-tau.vercel.app" target="_blank">Verdict</a>
    → Settings → Connect Extension.
  </p>
  <script src="popup.js"></script>
</body>
</html>
